<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus 留言板 - 高效沟通平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --primary-light: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --secondary: #6b7280;
      --border: #e5e7eb;
      --bg-light: #f9fafb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #1f2937;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px 0;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 12px;
      opacity: 0.85;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      font-size: 14px;
    }

    .admin-badge {
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Button ===== */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      box-shadow: 0 8px 16px rgba(239, 68, 68, 0.2);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* ===== Modal ===== */
    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-mask.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #111827;
    }

    .modal-subtitle {
      color: var(--secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .modal-group {
      margin-bottom: 16px;
    }

    .modal-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .modal input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .modal-err {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 28px;
    }

    .modal-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--secondary);
    }

    .modal-switch a {
      color: var(--primary);
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
    }

    .modal-switch a:hover {
      text-decoration: underline;
    }

    /* ===== Container ===== */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* ===== Card ===== */
    .card {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title-icon {
      font-size: 24px;
    }

    .post-tip {
      color: var(--secondary);
      font-size: 14px;
      padding: 16px;
      background: var(--bg-light);
      border-radius: 8px;
      border-left: 4px solid var(--primary);
    }

    .post-form {
      display: none;
    }

    .post-form.show {
      display: block;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      transition: all 0.3s ease;
      margin-bottom: 12px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .post-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ===== Messages ===== */
    #no-messages {
      text-align: center;
      padding: 60px 20px;
      color: var(--secondary);
      font-size: 16px;
    }

    .message-item {
      background: linear-gradient(135deg, #f8faff 0%, #eef5ff 100%);
      border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0;
      padding: 24px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .message-item:hover {
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
      transform: translateX(4px);
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 10px;
    }

    .message-author {
      font-weight: 700;
      color: var(--primary);
      font-size: 14px;
    }

    .message-time {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .message-content {
      font-size: 15px;
      line-height: 1.8;
      color: #1f2937;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ===== Replies ===== */
    .replies {
      margin-top: 16px;
      padding-left: 16px;
      border-left: 2px solid #d0e4f7;
    }

    .reply-item {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .reply-item:hover {
      background: #e5e7eb;
    }

    .reply-content {
      flex: 1;
    }

    .reply-author {
      font-weight: 700;
      color: var(--primary);
      font-size: 13px;
    }

    .reply-text {
      margin-top: 4px;
      color: #374151;
      line-height: 1.6;
      word-break: break-word;
    }

    .reply-time {
      color: #9ca3af;
      font-size: 11px;
      margin-top: 4px;
    }

    .reply-delete {
      flex-shrink: 0;
    }

    .reply-form {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .reply-form.open {
      display: block;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reply-form textarea {
      min-height: 70px;
      margin-bottom: 8px;
    }

    .reply-form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      color: var(--secondary);
      font-size: 16px;
      margin-bottom: 8px;
    }

    .empty-state-hint {
      color: #9ca3af;
      font-size: 14px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .modal {
        margin: 20px;
        max-width: none;
      }

      .card {
        padding: 20px;
      }

      .message-item {
        padding: 16px;
      }

      .user-info {
        font-size: 12px;
        padding: 6px 12px;
      }

      .logo {
        font-size: 22px;
      }
    }

    /* ===== Animations ===== */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    .loading {
      animation: shimmer 2s infinite;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 1000px 100%;
    }
  </style>
</head>
<body>

<header>
  <div class="header-container">
    <div class="header-left">
      <div>
        <div class="logo">✨ Nexus</div>
        <div class="tagline">Message Board</div>
      </div>
    </div>
    <div class="header-right" id="header-user">
      <button class="btn btn-outline" onclick="showModal('login')">登录</button>
      <button class="btn btn-outline" onclick="showModal('register')">注册</button>
    </div>
  </div>
</header>

<!-- 登录模态框 -->
<div class="modal-mask" id="modal-login">
  <div class="modal">
    <h2>欢迎回来</h2>
    <div class="modal-subtitle">登录你的账户</div>
    <div class="modal-group">
      <label>用户名</label>
      <input id="login-username" type="text" placeholder="输入你的用户名">
    </div>
    <div class="modal-group">
      <label>密码</label>
      <input id="login-password" type="password" placeholder="输入你的密码">
    </div>
    <div class="modal-err" id="login-err"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal('login')">取消</button>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>
    <div class="modal-switch">没有账号？<a onclick="switchModal('login','register')">立即注册</a></div>
  </div>
</div>

<!-- 注册模态框 -->
<div class="modal-mask" id="modal-register">
  <div class="modal">
    <h2>加入我们</h2>
    <div class="modal-subtitle">创建一个新账户</div>
    <div class="modal-group">
      <label>用户名</label>
      <input id="reg-username" type="text" placeholder="选择一个用户名">
    </div>
    <div class="modal-group">
      <label>密码</label>
      <input id="reg-password" type="password" placeholder="设置一个强密码">
    </div>
    <div class="modal-err" id="reg-err"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal('register')">取消</button>
      <button class="btn btn-primary" onclick="doRegister()">注册</button>
    </div>
    <div class="modal-switch">已有账号？<a onclick="switchModal('register','login')">去登录</a></div>
  </div>
</div>

<div class="container">
  <!-- 发布留言 -->
  <div class="card">
    <div class="card-title">
      <span class="card-title-icon">✍️</span>
      发表留言
    </div>
    <div id="post-tip" class="post-tip">🔐 请先登录后发表留言</div>
    <div id="post-form" class="post-form show">
      <textarea id="content" placeholder="分享你的想法，让我们一起交流..."></textarea>
      <div class="post-actions">
        <button class="btn btn-primary" onclick="submitMessage()">
          <span>📤</span> 发布留言
        </button>
      </div>
    </div>
  </div>

  <!-- 留言列表 -->
  <div class="card">
    <div class="card-title">
      <span class="card-title-icon">💬</span>
      留言列表
    </div>
    <div id="messages-list">
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">暂无留言</div>
        <div class="empty-state-hint">快来发表第一条留言吧</div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentUser = null;

  // 初始化
  async function init() {
    const res = await fetch('/api/me', { credentials: 'include' });
    currentUser = await res.json();
    updateHeader();
    loadMessages();
  }

  function updateHeader() {
    const el = document.getElementById('header-user');
    if (currentUser) {
      const badge = currentUser.isAdmin ? '<span class="admin-badge">👑 管理员</span>' : '';
      el.innerHTML = `
        <div class="user-info">
          <span>👤 ${esc(currentUser.username)}</span>
          ${badge}
        </div>
        <button class="btn btn-outline" onclick="doLogout()">退出</button>
      `;
      document.getElementById('post-tip').style.display = 'none';
      document.getElementById('post-form').classList.add('show');
    } else {
      el.innerHTML = `
        <button class="btn btn-outline" onclick="showModal('login')">登录</button>
        <button class="btn btn-outline" onclick="showModal('register')">注册</button>
      `;
      document.getElementById('post-tip').style.display = 'block';
      document.getElementById('post-form').classList.remove('show');
    }
  }

  function showModal(type) {
    document.getElementById('modal-' + type).classList.add('show');
  }

  function closeModal(type) {
    document.getElementById('modal-' + type).classList.remove('show');
  }

  function switchModal(from, to) {
    closeModal(from);
    showModal(to);
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-err');
    
    if (!username || !password) {
      err.textContent = '❌ 用户名和密码不能为空';
      return;
    }

    const res = await fetch('/api/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (!res.ok) {
      err.textContent = '❌ ' + data.error;
      return;
    }
    
    currentUser = data;
    closeModal('login');
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    err.textContent = '';
    updateHeader();
    loadMessages();
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-err');
    
    if (!username || !password) {
      err.textContent = '❌ 用户名和密码不能为空';
      return;
    }

    const res = await fetch('/api/register', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (!res.ok) {
      err.textContent = '❌ ' + data.error;
      return;
    }
    
    currentUser = data;
    closeModal('register');
    document.getElementById('reg-username').value = '';
    document.getElementById('reg-password').value = '';
    err.textContent = '';
    updateHeader();
    loadMessages();
  }

  async function doLogout() {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    currentUser = null;
    updateHeader();
    loadMessages();
  }

  // 留言管理
  async function loadMessages() {
    const res = await fetch('/api/messages', { credentials: 'include' });
    const messages = await res.json();
    const list = document.getElementById('messages-list');
    
    if (!messages.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div class="empty-state-text">暂无留言</div>
          <div class="empty-state-hint">快来发表第一条留言吧</div>
        </div>
      `;
      return;
    }

    list.innerHTML = messages.map(msg => `
      <div class="message-item" id="msg-${msg.id}">
        <div class="message-meta">
          <span class="message-author">👤 ${esc(msg.author)}</span>
          <span class="message-time">
            🕐 ${new Date(msg.created_at).toLocaleString('zh-CN')}
          </span>
        </div>
        <div class="message-content">${esc(msg.content)}</div>
        <div class="message-actions">
          ${currentUser ? `<button class="btn btn-sm btn-primary" onclick="toggleReply(${msg.id})">💬 回复</button>` : ''}
          ${currentUser?.isAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteMessage(${msg.id})">🗑️ 删除</button>` : ''}
        </div>
        <div class="reply-form" id="reply-form-${msg.id}">
          <textarea id="reply-content-${msg.id}" placeholder="输入你的回复..."></textarea>
          <div class="reply-form-actions">
            <button class="btn btn-sm btn-outline" onclick="toggleReply(${msg.id})">取消</button>
            <button class="btn btn-sm btn-success" onclick="submitReply(${msg.id})">提交回复</button>
          </div>
        </div>
        ${msg.replies.length ? `
          <div class="replies">
            ${msg.replies.map(r => `
              <div class="reply-item">
                <div class="reply-content">
                  <div class="reply-author">👤 ${esc(r.author)}</div>
                  <div class="reply-text">${esc(r.content)}</div>
                  <div class="reply-time">🕐 ${new Date(r.created_at).toLocaleString('zh-CN')}</div>
                </div>
                ${currentUser?.isAdmin ? `<div class="reply-delete"><button class="btn btn-sm btn-danger" onclick="deleteReply(${r.id})">删除</button></div>` : ''}
              </div>
            `).join('')}
          </div>` : ''}
      </div>
    `).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function toggleReply(id) {
    document.getElementById(`reply-form-${id}`).classList.toggle('open');
  }

  async function submitMessage() {
    const content = document.getElementById('content').value.trim();
    if (!content) {
      alert('💬 留言内容不能为空');
      return;
    }
    
    const res = await fetch('/api/messages', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    
    if (res.ok) {
      document.getElementById('content').value = '';
      loadMessages();
    }
  }

  async function submitReply(msgId) {
    const content = document.getElementById(`reply-content-${msgId}`).value.trim();
    if (!content) {
      alert('💬 回复内容不能为空');
      return;
    }
    
    const res = await fetch(`/api/messages/${msgId}/replies`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    
    if (res.ok) {
      loadMessages();
    }
  }

  async function deleteMessage(id) {
    if (!confirm('⚠️ 确定删除该留言及所有回复吗？')) return;
    await fetch(`/api/messages/${id}`, { method: 'DELETE', credentials: 'include' });
    loadMessages();
  }

  async function deleteReply(id) {
    if (!confirm('⚠️ 确定删除该回复吗？')) return;
    await fetch(`/api/replies/${id}`, { method: 'DELETE', credentials: 'include' });
    loadMessages();
  }

  init();
</script>
