<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - 高端留言板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1f2937;
      --primary-light: #374151;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
      --border: #e5e7eb;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-tertiary: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== Layout ===== */
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    /* ===== Header / Navigation ===== */
    header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 32px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 700;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-nav {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .nav-item {
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-item:hover {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 13px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 13px;
    }

    .user-status {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .admin-badge {
      display: inline-block;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Button System ===== */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
      border-color: var(--text-secondary);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-icon {
      padding: 8px 12px;
      gap: 4px;
    }

    /* ===== Main Content ===== */
    .main-content {
      flex: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px;
      width: 100%;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--bg-primary);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 18px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .modal-divider {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .modal-divider a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .modal-divider a:hover {
      text-decoration: underline;
    }

    /* ===== Cards ===== */
    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .section-icon {
      font-size: 18px;
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
    }

    /* ===== Compose Area ===== */
    .compose-area {
      display: none;
    }

    .compose-area.show {
      display: block;
    }

    .compose-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .compose-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .compose-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .compose-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .compose-hint {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .compose-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      transition: all 0.2s ease;
      margin-bottom: 12px;
    }

    .compose-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .compose-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .compose-hint-area {
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ===== Messages List ===== */
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.3s ease;
    }

    .message:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .message-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .message-author-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message-author-details {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message-author {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
    }

    .message-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .message-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .message-content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-primary);
      margin-bottom: 16px;
      word-break: break-word;
    }

    .message-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== Replies ===== */
    .replies-section {
      margin-top: 16px;
      padding-left: 16px;
      border-left: 2px solid var(--accent);
    }

    .replies-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reply {
      background: var(--bg-tertiary);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .reply-author {
      font-weight: 600;
      color: var(--accent);
      font-size: 12px;
    }

    .reply-text {
      margin-top: 4px;
      color: var(--text-primary);
      line-height: 1.6;
      word-break: break-word;
    }

    .reply-time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .reply-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      align-items: flex-start;
    }

    .reply-form {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }

    .reply-form.open {
      display: block;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reply-form textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      min-height: 60px;
      margin-bottom: 8px;
    }

    .reply-form textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .reply-form-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .empty-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .header-inner {
        padding: 12px 16px;
        gap: 16px;
        flex-wrap: wrap;
      }

      .header-nav {
        display: none;
      }

      .logo-text {
        display: none;
      }

      .modal {
        margin: 16px;
        max-width: none;
      }

      .main-content {
        padding: 16px;
      }

      .card {
        padding: 16px;
      }

      .message {
        padding: 16px;
      }

      .message-header {
        flex-direction: column;
      }

      .message-actions {
        width: 100%;
        justify-content: space-between;
      }

      .compose-actions {
        flex-direction: column-reverse;
      }

      .compose-actions .btn {
        width: 100%;
        justify-content: center;
      }

      .user-card {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .logo-title {
        font-size: 16px;
      }

      .logo-subtitle {
        font-size: 10px;
      }

      .modal-title {
        font-size: 20px;
      }

      .section-title {
        font-size: 14px;
      }

      .message-content {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo-section">
        <div class="logo-icon">✨</div>
        <div class="logo-text">
          <div class="logo-title">Nexus</div>
          <div class="logo-subtitle">Message Board</div>
        </div>
      </div>
      <div class="header-nav" id="header-nav" style="display: none;">
        <a class="nav-item">首页</a>
        <a class="nav-item">热门</a>
        <a class="nav-item">关于</a>
      </div>
      <div class="header-actions" id="header-actions">
        <button class="btn btn-secondary btn-icon" onclick="showModal('login')">登录</button>
        <button class="btn btn-primary btn-icon" onclick="showModal('register')">注册</button>
      </div>
    </div>
  </header>

  <!-- Login Modal -->
  <div class="modal-overlay" id="modal-login">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">欢迎回来</div>
        <div class="modal-subtitle">登录你的账户以继续</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input id="login-username" class="form-input" type="text" placeholder="输入你的用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input id="login-password" class="form-input" type="password" placeholder="输入你的密码">
        </div>
        <div class="form-error" id="login-err"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('login')">取消</button>
        <button class="btn btn-primary" onclick="doLogin()">登录</button>
      </div>
      <div class="modal-divider">没有账号？<a onclick="switchModal('login','register')">立即注册</a></div>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal-overlay" id="modal-register">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">加入我们</div>
        <div class="modal-subtitle">创建一个新账户加入社区</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input id="reg-username" class="form-input" type="text" placeholder="选择一个用户名">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input id="reg-password" class="form-input" type="password" placeholder="设置一个密码">
        </div>
        <div class="form-error" id="reg-err"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('register')">取消</button>
        <button class="btn btn-primary" onclick="doRegister()">注册</button>
      </div>
      <div class="modal-divider">已有账号？<a onclick="switchModal('register','login')">去登录</a></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Compose Section -->
    <div class="section">
      <div class="card">
        <div id="compose-login-hint" class="compose-hint-area">
          🔐 请先 <a onclick="showModal('login')" style="color: var(--accent); cursor: pointer; font-weight: 600;">登录</a> 或 <a onclick="showModal('register')" style="color: var(--accent); cursor: pointer; font-weight: 600;">注册</a> 后发表留言
        </div>
        <div id="compose-form" class="compose-area">
          <div class="compose-header">
            <div class="compose-avatar" id="compose-avatar">U</div>
            <div class="compose-info">
              <div class="compose-name" id="compose-name">User</div>
              <div class="compose-hint">现在分享你的想法</div>
            </div>
          </div>
          <textarea id="content" class="compose-input" placeholder="说些什么吧...（按 Ctrl+Enter 快速发布）"></textarea>
          <div class="compose-actions">
            <button class="btn btn-primary" onclick="submitMessage()">发布留言</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Messages Section -->
    <div class="section">
      <div class="section-header">
        <span class="section-icon">💬</span>
        <span class="section-title">所有留言</span>
      </div>
      <div id="messages-list" class="messages-list">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">暂无留言</div>
          <div class="empty-text">快来发表第一条留言吧</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentUser = null;

  // 初始化
  async function init() {
    const res = await fetch('/api/me', { credentials: 'include' });
    currentUser = await res.json();
    updateHeader();
    loadMessages();
  }

  function updateHeader() {
    const el = document.getElementById('header-actions');
    if (currentUser) {
      const avatar = currentUser.username.charAt(0).toUpperCase();
      const badge = currentUser.isAdmin ? '<span class="admin-badge">👑 管理员</span>' : '';
      el.innerHTML = `
        <div class="user-card">
          <div class="user-avatar">${avatar}</div>
          <div class="user-info">
            <div class="user-name">${esc(currentUser.username)}</div>
            <div class="user-status">已登录</div>
          </div>
          ${badge}
        </div>
        <button class="btn btn-secondary btn-icon" onclick="doLogout()">退出</button>
      `;
      document.getElementById('compose-login-hint').style.display = 'none';
      document.getElementById('compose-form').classList.add('show');
      document.getElementById('compose-avatar').textContent = avatar;
      document.getElementById('compose-name').textContent = currentUser.username;
    } else {
      el.innerHTML = `
        <button class="btn btn-secondary btn-icon" onclick="showModal('login')">登录</button>
        <button class="btn btn-primary btn-icon" onclick="showModal('register')">注册</button>
      `;
      document.getElementById('compose-login-hint').style.display = 'block';
      document.getElementById('compose-form').classList.remove('show');
    }
  }

  function showModal(type) {
    document.getElementById('modal-' + type).classList.add('show');
  }

  function closeModal(type) {
    document.getElementById('modal-' + type).classList.remove('show');
  }

  function switchModal(from, to) {
    closeModal(from);
    showModal(to);
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-err');
    
    if (!username || !password) {
      err.textContent = '❌ 用户名和密码不能为空';
      return;
    }

    const res = await fetch('/api/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (!res.ok) {
      err.textContent = '❌ ' + data.error;
      return;
    }
    
    currentUser = data;
    closeModal('login');
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    err.textContent = '';
    updateHeader();
    loadMessages();
  }

  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-err');
    
    if (!username || !password) {
      err.textContent = '❌ 用户名和密码不能为空';
      return;
    }

    const res = await fetch('/api/register', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    if (!res.ok) {
      err.textContent = '❌ ' + data.error;
      return;
    }
    
    currentUser = data;
    closeModal('register');
    document.getElementById('reg-username').value = '';
    document.getElementById('reg-password').value = '';
    err.textContent = '';
    updateHeader();
    loadMessages();
  }

  async function doLogout() {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    currentUser = null;
    document.getElementById('content').value = '';
    updateHeader();
    loadMessages();
  }

  // Messages Management
  async function loadMessages() {
    const res = await fetch('/api/messages', { credentials: 'include' });
    const messages = await res.json();
    const list = document.getElementById('messages-list');
    
    if (!messages.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">暂无留言</div>
          <div class="empty-text">快来发表第一条留言吧</div>
        </div>
      `;
      return;
    }

    list.innerHTML = messages.map(msg => {
      const avatar = msg.author.charAt(0).toUpperCase();
      return `
        <div class="message" id="msg-${msg.id}">
          <div class="message-header">
            <div class="message-author-info">
              <div class="message-avatar">${avatar}</div>
              <div class="message-author-details">
                <div class="message-author">${esc(msg.author)}</div>
                <div class="message-time">${new Date(msg.created_at).toLocaleString('zh-CN')}</div>
              </div>
            </div>
            <div class="message-actions">
              ${currentUser ? `<button class="btn btn-sm btn-primary" onclick="toggleReply(${msg.id})">回复</button>` : ''}
              ${currentUser?.isAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteMessage(${msg.id})">删除</button>` : ''}
            </div>
          </div>
          <div class="message-content">${esc(msg.content)}</div>
          ${msg.replies.length ? `
            <div class="replies-section">
              <div class="replies-header">💬 ${msg.replies.length} 条回复</div>
              ${msg.replies.map(r => `
                <div class="reply">
                  <div style="flex: 1;">
                    <div class="reply-author">${esc(r.author)}</div>
                    <div class="reply-text">${esc(r.content)}</div>
                    <div class="reply-time">${new Date(r.created_at).toLocaleString('zh-CN')}</div>
                  </div>
                  ${currentUser?.isAdmin ? `<div class="reply-actions"><button class="btn btn-sm btn-danger" onclick="deleteReply(${r.id})">删除</button></div>` : ''}
                </div>
              `).join('')}
            </div>` : ''}
          <div class="reply-form" id="reply-form-${msg.id}">
            <textarea id="reply-content-${msg.id}" placeholder="输入你的回复..."></textarea>
            <div class="reply-form-actions">
              <button class="btn btn-sm btn-secondary" onclick="toggleReply(${msg.id})">取消</button>
              <button class="btn btn-sm btn-primary" onclick="submitReply(${msg.id})">提交</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function esc(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function toggleReply(id) {
    document.getElementById(`reply-form-${id}`).classList.toggle('open');
  }

  async function submitMessage() {
    const content = document.getElementById('content').value.trim();
    if (!content) {
      alert('💬 留言内容不能为空');
      return;
    }
    
    const res = await fetch('/api/messages', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    
    if (res.ok) {
      document.getElementById('content').value = '';
      loadMessages();
    }
  }

  async function submitReply(msgId) {
    const content = document.getElementById(`reply-content-${msgId}`).value.trim();
    if (!content) {
      alert('💬 回复内容不能为空');
      return;
    }
    
    const res = await fetch(`/api/messages/${msgId}/replies`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    
    if (res.ok) {
      loadMessages();
    }
  }

  async function deleteMessage(id) {
    if (!confirm('⚠️ 确定删除该留言及所有回复吗？')) return;
    await fetch(`/api/messages/${id}`, { method: 'DELETE', credentials: 'include' });
    loadMessages();
  }

  async function deleteReply(id) {
    if (!confirm('⚠️ 确定删除该回复吗？')) return;
    await fetch(`/api/replies/${id}`, { method: 'DELETE', credentials: 'include' });
    loadMessages();
  }

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && currentUser) {
      const content = document.getElementById('content');
      if (document.activeElement === content && content.value.trim()) {
        submitMessage();
      }
    }
  });

  init();
</script>

</body>
</html>
